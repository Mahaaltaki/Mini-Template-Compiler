<html>
<head>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="product-details">
        <h1 class="title">{{ selected_product_name }}</h1>
        
        <div class="image-box">
            <img src="{{ selected_product_image }}" width="500px">
        </div>

        <div class="info">
            <p class="description">{{ selected_product_details }}</p>
            <span class="price-tag">{{ selected_product_price }} S.Y.P</span>
        </div>

        <div class="actions">
            <a href="/edit">Edit</a>
            <button class="btn-delete">Delete {{ selected_product_name }}</button>
        </div>
    </div>
</body>
</html>
