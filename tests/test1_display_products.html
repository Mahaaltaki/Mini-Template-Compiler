<html>
<head>
    <title>Smartphone Store</title>
</head>
<body>
    <h1>Available Products List</h1>
    
    <div class="products-container">

        {% for item in products_list %}
            <div class="card">
                <img src="{{ item.image_url }}" alt="Product Image">
                <h2>{{ item.name }}</h2>
                <p>Price: {{ item.price }} Syrian Pounds</p>
                <button>Add to Cart</button>
            </div>
        {% endfor %}

    </div>
    
    <footer>
        <p>All rights reserved {{ current_year }}</p>
    </footer>
</body>
</html>
